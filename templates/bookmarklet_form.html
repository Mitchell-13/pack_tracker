<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" />
  <title>Quick Add</title>
  <style>
    :root {
      --bg: #050816;
      --panel: rgba(15, 23, 42, 0.9);
      --panel-border: rgba(148, 163, 184, 0.3);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --primary: #22d3ee;
      --success: #34d399;
      --error: #f87171;
    }

    * { box-sizing: border-box; }

    html {
      background:
        radial-gradient(circle at 10% 10%, rgba(34, 211, 238, 0.22), transparent 35%),
        linear-gradient(145deg, #020617, var(--bg));
      background-attachment: fixed;
    }

    body {
      font-family: 'Inter', 'Segoe UI', Roboto, Arial, sans-serif;
      max-width: 760px;
      margin: 1.5rem auto;
      padding: 0 1rem;
      line-height: 1.45;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(34, 211, 238, 0.22), transparent 35%),
        linear-gradient(145deg, #020617, var(--bg));
      min-height: 100vh;
      background-attachment: fixed;
    }

    h1 { margin-bottom: 0.4rem; }
    p { color: var(--muted); margin-top: 0; }

    form {
      display: grid;
      gap: 0.75rem;
      border: 1px solid var(--panel-border);
      border-radius: 14px;
      padding: 1rem;
      background: var(--panel);
      box-shadow: 0 20px 40px rgba(2, 6, 23, 0.45);
    }

    label { font-weight: 600; color: #cbd5e1; }

    input,
    select,
    textarea,
    button {
      font: inherit;
      padding: 0.6rem 0.72rem;
      border-radius: 10px;
      border: 1px solid rgba(148, 163, 184, 0.35);
      color: var(--text);
      background: rgba(15, 23, 42, 0.85);
    }

    textarea { min-height: 5rem; resize: vertical; }

    button {
      background: linear-gradient(145deg, #67e8f9, var(--primary));
      color: #06202a;
      font-weight: 700;
      cursor: pointer;
      border: 0;
    }

    .tag-editor {
      border: 1px solid rgba(148, 163, 184, 0.35);
      border-radius: 10px;
      background: rgba(15, 23, 42, 0.85);
      padding: 0.35rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      min-height: 42px;
    }

    .tag-editor input {
      border: 0;
      outline: none;
      min-width: 180px;
      flex: 1;
      padding: 0.35rem;
      background: transparent;
    }

    .tag-bubble {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: rgba(34, 211, 238, 0.16);
      color: #67e8f9;
      border-radius: 999px;
      padding: 0.2rem 0.55rem;
      font-size: 0.9rem;
    }

    .tag-bubble button {
      width: auto;
      border: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      font-size: 1rem;
    }

    .inline { display: flex; align-items: center; gap: 0.5rem; font-weight: 400; }

    .message {
      padding: 0.75rem;
      border-radius: 10px;
      margin-bottom: 1rem;
      border: 1px solid transparent;
      backdrop-filter: blur(8px);
    }

    .success {
      background: rgba(52, 211, 153, 0.1);
      border-color: rgba(52, 211, 153, 0.5);
      color: #a7f3d0;
    }

    .error {
      background: rgba(248, 113, 113, 0.1);
      border-color: rgba(248, 113, 113, 0.5);
      color: #fecaca;
    }
  </style>
</head>
<body>
  <h1>Quick Add Entry</h1>
  <p>This form is intended for bookmarklet usage. It pre-fills the current page URL as the entry link.</p>

  {% if success %}
    <div class="message success">Entry saved successfully. This window will close automatically.</div>
  {% endif %}

  {% if error %}
    <div class="message error">Please fill all required fields with valid values.</div>
  {% endif %}

  <form method="post" action="{{ url_for('bookmarklet_add_ticket') }}">
    <label for="link">Entry Link</label>
    <input id="link" name="link" type="url" value="{{ form_values['link'] }}" required />

    <label for="category_id">Category</label>
    <select id="category_id" name="category_id">
      <option value="">Select category</option>
      {% for category in categories %}
        <option value="{{ category['id'] }}" {% if form_values['category_id'] == category['id']|string %}selected{% endif %}>
          {{ category['name'] }}
        </option>
      {% endfor %}
    </select>

    <label for="new_category_name">Or add new category</label>
    <input
      id="new_category_name"
      name="new_category_name"
      type="text"
      placeholder="e.g. Investigation"
      value="{{ form_values.get('new_category_name', '') }}"
    />

    <label for="description">Description</label>
    <textarea id="description" name="description" required>{{ form_values['description'] }}</textarea>

    <label for="ai_analysis">Notes</label>
    <textarea id="ai_analysis" name="ai_analysis">{{ form_values['notes'] }}</textarea>

    <label for="tags">Tags</label>
    <input id="tags" name="tags" type="hidden" value="{{ form_values['tags'] }}" />
    <div class="tag-editor" data-tag-editor data-hidden-input-id="tags">
      <input type="text" placeholder="Add a tag then press Tab or click away" data-tag-input />
    </div>

    <label for="date">Date</label>
    <input id="date" name="date" type="date" value="{{ form_values['date'] or today_date }}" required />

    <label class="inline" for="shared_with_manager">
      <input id="shared_with_manager" name="shared_with_manager" type="checkbox" {% if form_values['shared_with_manager'] %}checked{% endif %} />
      Shared with manager
    </label>

    <label class="inline" for="favorite">
      <input id="favorite" name="favorite" type="checkbox" {% if form_values['favorite'] %}checked{% endif %} />
      Favorite
    </label>

    <button type="submit">Save Entry</button>
  </form>

  <script>
    function initializeTagEditor(editor) {
      const hiddenInput = document.getElementById(editor.dataset.hiddenInputId);
      const tagInput = editor.querySelector('[data-tag-input]');
      if (!hiddenInput || !tagInput) {
        return;
      }

      const tags = [];
      const existingTags = (hiddenInput.value || '')
        .split(',')
        .map((tag) => tag.trim())
        .filter((tag) => tag);

      function syncHiddenInput() {
        hiddenInput.value = tags.join(', ');
      }

      function removeTag(indexToRemove) {
        tags.splice(indexToRemove, 1);
        renderTags();
      }

      function renderTags() {
        editor.querySelectorAll('.tag-bubble').forEach((bubble) => bubble.remove());

        tags.forEach((tag, index) => {
          const bubble = document.createElement('span');
          bubble.className = 'tag-bubble';
          bubble.textContent = tag;

          const removeButton = document.createElement('button');
          removeButton.type = 'button';
          removeButton.setAttribute('aria-label', `Remove ${tag}`);
          removeButton.textContent = '×';
          removeButton.addEventListener('click', () => removeTag(index));
          bubble.appendChild(removeButton);

          editor.insertBefore(bubble, tagInput);
        });

        syncHiddenInput();
      }

      function addTag(rawTag) {
        const tag = (rawTag || '').trim();
        if (!tag) {
          return;
        }

        const lowerTag = tag.toLowerCase();
        if (tags.some((existingTag) => existingTag.toLowerCase() === lowerTag)) {
          return;
        }

        tags.push(tag);
        renderTags();
      }

      function commitInputTag() {
        addTag(tagInput.value);
        tagInput.value = '';
      }

      existingTags.forEach((tag) => addTag(tag));

      tagInput.addEventListener('keydown', (event) => {
        if (event.key === 'Tab') {
          event.preventDefault();
          commitInputTag();
          tagInput.focus();
        }
      });

      tagInput.addEventListener('blur', () => {
        commitInputTag();
      });

      editor.addEventListener('click', () => {
        tagInput.focus();
      });

      renderTags();
    }

    document.querySelectorAll('[data-tag-editor]').forEach((editor) => {
      initializeTagEditor(editor);
    });

    {% if success %}
      if (window.opener && !window.opener.closed) {
        window.opener.location.reload();
      }

      setTimeout(() => {
        window.close();
      }, 700);
    {% endif %}
  </script>
</body>
</html>
